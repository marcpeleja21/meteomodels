<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MeteoModels</title>

<!-- Primary meta -->
<meta name="description" content="Compara els models meteorològics més precisos del món: GFS, ECMWF, ICON, AROME, ARPEGE i més en temps real.">
<meta name="author" content="marcpeleja">
<meta name="keywords" content="meteorologia, models, GFS, ECMWF, ICON, AROME, temps, previsió">

<!-- PWA / Theme -->
<meta name="theme-color" content="#0b1220">
<meta name="color-scheme" content="dark">

<!-- Android / Chrome PWA -->
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.webmanifest">

<!-- iOS Safari PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeteoModels">

<!-- Icons -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Open Graph (for sharing links) -->
<meta property="og:type" content="website">
<meta property="og:title" content="MeteoModels">
<meta property="og:description" content="Compara els models meteorològics més precisos del món en temps real.">
<meta property="og:image" content="/icons/icon-512x512.png">

<!-- Microsoft -->
<meta name="msapplication-TileColor" content="#0b1220">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">

<!-- Explicit SW registration — visible to crawlers before the JS bundle loads -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .catch(function (e) { console.warn('[SW] registration failed:', e); });
    });
  }
</script>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="app">
<!-- HEADER -->
<header class="header">

  <div class="brand" id="brandHome" role="button" tabindex="0" style="cursor:pointer" title="Tornar a l'inici">
    <span class="brand-icon">🌍</span>
    <div>
      <div class="brand-title">MeteoModels</div>
      <div class="brand-sub">Comparativa de models meteorològics</div>
    </div>
  </div>

  <div id="headerLoc" class="header-loc hidden">
    <!-- Normal display: pin + name + button -->
    <span class="hloc-pin">📍</span>
    <span id="headerLocName"></span>
    <button id="changeLoc" class="change-loc-btn">✎ Canviar</button>
    <!-- Inline search (shown when Canviar is clicked) -->
    <div id="headerSearchWrap" class="header-search-wrap hidden">
      <input id="headerSearchInput" type="text" class="header-search-input" autocomplete="off" spellcheck="false">
      <button id="headerSearchCancel" class="header-search-cancel">✕</button>
      <div id="headerSearchSugg" class="header-sugg-pop"></div>
    </div>
  </div>

  <!-- Nav Dropdown (only shown when location is selected) -->
  <div class="nav-dropdown hidden" id="navDropdown">
    <button class="nav-current" id="navCurrent">
      <span id="navCurrentLabel">Previsió</span>
      <span class="nav-chevron">▾</span>
    </button>
    <div class="nav-menu" id="navMenu">
      <button class="nav-option active" data-page="forecast" id="navOptForecast">📅 Previsió</button>
      <button class="nav-option" data-page="models" id="navOptModels">🗺 Models</button>
    </div>
  </div>

  <!-- Language Dropdown -->
  <div class="lang-dropdown" id="langDropdown">
    <button class="lang-current" id="langCurrent">
      <span id="langCurrentFlag"></span>
      <span id="langCurrentCode">CA</span>
      <span class="lang-chevron">▾</span>
    </button>
    <div class="lang-menu" id="langMenu">
      <button class="lang-option" data-lang="ca"><svg class="flag-svg" viewBox="0 0 20 14"><rect width="20" height="14" fill="#FCDD09"/><rect y="1.56" width="20" height="1.56" fill="#C60B1E"/><rect y="4.67" width="20" height="1.56" fill="#C60B1E"/><rect y="7.78" width="20" height="1.56" fill="#C60B1E"/><rect y="10.89" width="20" height="1.56" fill="#C60B1E"/></svg> Català</button>
      <button class="lang-option" data-lang="es">🇪🇸 Español</button>
      <button class="lang-option" data-lang="en">🇬🇧 English</button>
      <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
    </div>
  </div>

</header>

<!-- MAIN -->
<main class="main">

  <!-- WELCOME -->
  <div id="welcomeScreen" class="welcome">
    <h2 id="welcomeTitle"></h2>
    <p id="welcomeSub"></p>
    <div class="welcome-search-wrap">
      <div class="welcome-search-row">
        <input id="searchInput" type="text" placeholder="Cerca una localitat..." autocomplete="off" spellcheck="false" class="welcome-input">
        <button id="searchBtn" class="welcome-btn">🔍 Cerca</button>
      </div>
      <div id="suggestions" class="suggestions welcome-suggestions"></div>
    </div>
    <div class="badge-row">
      <span class="badge">🇺🇸 GFS</span>
      <span class="badge">🇪🇺 ECMWF IFS</span>
      <span class="badge">🇩🇪 ICON</span>
      <span class="badge">🇩🇪 ICON EU</span>
      <span class="badge">🇨🇭 MeteoBlue</span>
      <span class="badge">🇫🇷 AROME HD</span>
      <span class="badge">🇫🇷 AROME 2.5 km</span>
      <span class="badge">🇫🇷 ARPEGE EU</span>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading hidden">
    <div class="spinner"></div>
    <p style="color:var(--text-muted)">Carregant dades meteorològiques...</p>
    <div id="loadingModels" class="lm-row"></div>
  </div>

  <!-- WEATHER DISPLAY -->
  <div id="wxDisplay" class="wx-display hidden">
    <!-- Official weather alerts banner -->
    <div id="alertsBanner" style="display:none"></div>
    <div id="locBar" class="loc-bar"></div>

    <!-- PAGE: FORECAST -->
    <div id="pageForecast">
      <div class="media-row">
        <div id="mapCard" class="map-card-wrap"></div>
        <div id="webcamCard" class="webcam-card-wrap"></div>
      </div>
      <!-- Real-time current observations -->
      <div id="stationCard"></div>
      <div class="model-tabs-wrap">
        <div class="model-tabs-label">Vista del model</div>
        <div id="modelTabs" class="model-tabs"></div>
      </div>
      <div class="main-card">
        <div id="mainCardTop" class="main-card-top"></div>
        <div class="mc-divider"></div>
        <!-- Forecast mode toggle -->
        <div class="fcast-mode-bar" id="fcastModeBar">
          <button class="fmode-tab active" data-fmode="days" id="fmodeDays">📅 Per dies</button>
          <button class="fmode-tab" data-fmode="hours" id="fmodeHours">🕐 Per hores</button>
        </div>
        <!-- Per dies view -->
        <div id="forecastDaysView">
          <div id="forecastStrip" class="forecast-strip"></div>
          <div id="forecastExpandRow" class="forecast-expand-row hidden">
            <button id="forecastExpandBtn" class="forecast-expand-btn">+ 3 dies ▾</button>
            <div id="forecastStripExtra" class="forecast-strip forecast-strip-extra"></div>
          </div>
        </div>
        <!-- Per hores view -->
        <div id="forecastHoursView" class="hidden"></div>
      </div>
      <div id="modelGrid" class="model-grid"></div>
      <div id="chartCard" class="chart-card"></div>
      <div id="tableCard" class="table-card"></div>
    </div>

    <!-- PAGE: MODELS -->
    <div id="pageModels" class="hidden"></div>

  </div>
</main>

<footer style="text-align:center;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom));font-size:.68rem;color:var(--text-dim)">
  Dades: <a href="https://open-meteo.com" target="_blank" style="color:var(--accent2)">Open-Meteo</a> (lliure) ·
  Creat per <span style="color:var(--text-muted);font-weight:600">marcpeleja</span>
  <br>
  <a href="https://ko-fi.com/marcpeleja" target="_blank" rel="noopener"
     style="display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:4px 11px;background:transparent;color:var(--text-muted);border:1px solid var(--text-dim);border-radius:20px;font-size:.65rem;font-weight:500;text-decoration:none;letter-spacing:.03em;transition:border-color .2s,color .2s"
     onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--text-dim)';this.style.color='var(--text-muted)'">
    ☕ Dona suport al projecte
  </a>
</footer>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
