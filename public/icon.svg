<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2e6"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#00d2e6"/>
    </linearGradient>
    <clipPath id="gc">
      <circle cx="256" cy="226" r="132"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0B1220"/>

  <!-- ── GLOBE ─────────────────────────────────────────────── -->
  <circle cx="256" cy="226" r="132" fill="none" stroke="url(#g1)" stroke-width="13"/>
  <g clip-path="url(#gc)" opacity="0.42">
    <ellipse cx="256" cy="226" rx="132" ry="50" fill="none" stroke="url(#g1)" stroke-width="8"/>
    <line x1="124" y1="226" x2="388" y2="226" stroke="url(#g1)" stroke-width="7"/>
    <line x1="256" y1="94"  x2="256" y2="358" stroke="url(#g1)" stroke-width="7"/>
    <ellipse cx="256" cy="226" rx="132" ry="22" fill="none" stroke="url(#g1)" stroke-width="5" transform="translate(0,-52)"/>
    <ellipse cx="256" cy="226" rx="132" ry="22" fill="none" stroke="url(#g1)" stroke-width="5" transform="translate(0,52)"/>
  </g>

  <!-- ── SUN (top-right, behind cloud) ─────────────────────── -->
  <circle cx="362" cy="112" r="40" fill="#FFD600"/>
  <!-- Sun rays -->
  <g stroke="#FFD600" stroke-width="8" stroke-linecap="round" opacity="0.75">
    <line x1="362" y1="55"  x2="362" y2="40"/>
    <line x1="362" y1="169" x2="362" y2="184"/>
    <line x1="305" y1="112" x2="290" y2="112"/>
    <line x1="419" y1="112" x2="434" y2="112"/>
    <line x1="322" y1="72"  x2="311" y2="61"/>
    <line x1="402" y1="152" x2="413" y2="163"/>
    <line x1="402" y1="72"  x2="413" y2="61"/>
    <line x1="322" y1="152" x2="311" y2="163"/>
  </g>

  <!-- ── CLOUD (sits over sun) ──────────────────────────────── -->
  <!-- Dark backing to separate cloud from sun -->
  <circle cx="300" cy="152" r="34" fill="#0B1220"/>
  <circle cx="334" cy="136" r="44" fill="#0B1220"/>
  <circle cx="372" cy="148" r="30" fill="#0B1220"/>
  <rect   x="266" y="144" width="136" height="44" fill="#0B1220"/>
  <!-- Cloud body -->
  <circle cx="300" cy="152" r="30" fill="#c8e8f8"/>
  <circle cx="334" cy="136" r="40" fill="#d8f0ff"/>
  <circle cx="372" cy="148" r="26" fill="#c8e8f8"/>
  <rect   x="270" y="150" width="128" height="36" fill="#d0ecfa"/>

  <!-- ── RAIN DROPS ─────────────────────────────────────────── -->
  <g fill="#4fc3f7">
    <ellipse cx="294" cy="214" rx="5.5" ry="10"/>
    <ellipse cx="316" cy="226" rx="5.5" ry="10"/>
    <ellipse cx="338" cy="214" rx="5.5" ry="10"/>
    <ellipse cx="360" cy="224" rx="5.5" ry="10"/>
    <ellipse cx="305" cy="236" rx="4.5" ry="8" opacity="0.7"/>
    <ellipse cx="349" cy="236" rx="4.5" ry="8" opacity="0.7"/>
  </g>

  <!-- ── SNOWFLAKE (left side, subtle) ─────────────────────── -->
  <g stroke="#a8d8f0" stroke-width="4.5" stroke-linecap="round" opacity="0.55"
     transform="translate(148,168)">
    <line x1="0" y1="-22" x2="0"   y2="22"/>
    <line x1="-22" y1="0" x2="22"  y2="0"/>
    <line x1="-16" y1="-16" x2="16" y2="16"/>
    <line x1="16"  y1="-16" x2="-16" y2="16"/>
    <line x1="-7"  y1="-15" x2="-15" y2="-7"/>
    <line x1="7"   y1="-15" x2="15" y2="-7"/>
    <line x1="-7"  y1="15"  x2="-15" y2="7"/>
    <line x1="7"   y1="15"  x2="15"  y2="7"/>
  </g>

  <!-- ── MODEL COMPARISON BARS (bottom) ────────────────────── -->
  <rect x="148" y="322" width="32" height="70" rx="8" fill="#4fc3f7" opacity="0.80"/>
  <rect x="192" y="294" width="32" height="98" rx="8" fill="url(#g2)"/>
  <rect x="236" y="310" width="32" height="82" rx="8" fill="#4fc3f7" opacity="0.80"/>
  <rect x="280" y="278" width="32" height="114" rx="8" fill="url(#g2)"/>
  <rect x="324" y="300" width="32" height="92" rx="8" fill="#4fc3f7" opacity="0.80"/>
  <rect x="368" y="314" width="32" height="78" rx="8" fill="url(#g2)" opacity="0.75"/>

  <!-- Baseline -->
  <line x1="132" y1="396" x2="412" y2="396"
        stroke="url(#g1)" stroke-width="5" opacity="0.30" stroke-linecap="round"/>
</svg>
