<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2e6"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#00d2e6"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="256" cy="220" r="138"/>
    </clipPath>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#0B1220"/>

  <!-- Globe outline -->
  <circle cx="256" cy="220" r="138" fill="none" stroke="url(#g1)" stroke-width="14"/>

  <!-- Globe meridians / parallels (clipped to globe) -->
  <g clip-path="url(#circle-clip)" opacity="0.45">
    <!-- Equator -->
    <ellipse cx="256" cy="220" rx="138" ry="52" fill="none" stroke="url(#g1)" stroke-width="8"/>
    <!-- Upper parallel -->
    <ellipse cx="256" cy="220" rx="116" ry="32" fill="none" stroke="url(#g1)" stroke-width="6" transform="translate(0,-44)"/>
    <!-- Lower parallel -->
    <ellipse cx="256" cy="220" rx="116" ry="32" fill="none" stroke="url(#g1)" stroke-width="6" transform="translate(0,44)"/>
    <!-- Prime meridian -->
    <line x1="256" y1="82" x2="256" y2="358" stroke="url(#g1)" stroke-width="8"/>
    <!-- Secondary meridians -->
    <line x1="118" y1="220" x2="394" y2="220" stroke="url(#g1)" stroke-width="8"/>
  </g>

  <!-- Cloud (top-right of globe, overlapping) -->
  <g>
    <circle cx="330" cy="132" r="26" fill="#0B1220"/>
    <circle cx="330" cy="132" r="22" fill="white" opacity="0.96"/>
    <circle cx="354" cy="122" r="32" fill="#0B1220"/>
    <circle cx="354" cy="122" r="28" fill="white" opacity="0.96"/>
    <circle cx="378" cy="130" r="22" fill="#0B1220"/>
    <circle cx="378" cy="130" r="18" fill="white" opacity="0.96"/>
    <rect x="308" y="128" width="90" height="28" fill="white" opacity="0.96"/>
  </g>

  <!-- Model comparison bars (bottom section) -->
  <rect x="152" y="318" width="34" height="74" rx="9" fill="#4fc3f7" opacity="0.80"/>
  <rect x="198" y="290" width="34" height="102" rx="9" fill="url(#g2)"/>
  <rect x="244" y="306" width="34" height="86"  rx="9" fill="#4fc3f7" opacity="0.80"/>
  <rect x="290" y="274" width="34" height="118" rx="9" fill="url(#g2)"/>
  <rect x="336" y="300" width="34" height="92"  rx="9" fill="#4fc3f7" opacity="0.80"/>

  <!-- Baseline for bars -->
  <line x1="136" y1="396" x2="388" y2="396" stroke="url(#g1)" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
</svg>
